apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillshub-web
  namespace: skillshub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillshub-web
  template:
    metadata:
      labels:
        app: skillshub-web
    spec:
      containers:
      - name: web
        image: skillshub-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skillshub-web
  namespace: skillshub
spec:
  selector:
    app: skillshub-web
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: LoadBalancer
