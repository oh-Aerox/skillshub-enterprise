apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillshub-scanner
  namespace: skillshub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillshub-scanner
  template:
    metadata:
      labels:
        app: skillshub-scanner
    spec:
      containers:
      - name: scanner
        image: skillshub-scanner:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          value: "postgresql://skillshub:$(DATABASE_PASSWORD)@postgres:5432/skillshub"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: skillshub-secrets
              key: minio-root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: skillshub-secrets
              key: minio-root-password
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skillshub-scanner
  namespace: skillshub
spec:
  selector:
    app: skillshub-scanner
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
