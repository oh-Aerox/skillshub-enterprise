apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillshub-api
  namespace: skillshub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillshub-api
  template:
    metadata:
      labels:
        app: skillshub-api
    spec:
      containers:
      - name: api
        image: skillshub-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: GIN_MODE
          value: "release"
        - name: DATABASE_URL
          value: "postgresql://skillshub:$(DATABASE_PASSWORD)@postgres:5432/skillshub"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: STORAGE_TYPE
          value: "minio"
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: skillshub-secrets
              key: minio-root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: skillshub-secrets
              key: minio-root-password
        - name: MINIO_BUCKET
          value: "skillshub-files"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: skillshub-secrets
              key: jwt-secret
        - name: SCANNER_SERVICE_URL
          value: "http://scanner:8000"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skillshub-api
  namespace: skillshub
spec:
  selector:
    app: skillshub-api
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
