apiVersion: v1
kind: ConfigMap
metadata:
  name: skillshub-config
  namespace: skillshub
data:
  # API 配置
  PORT: "3000"
  GIN_MODE: "release"
  DATABASE_URL: "postgresql://skillshub:$(DATABASE_PASSWORD)@postgres:5432/skillshub"
  REDIS_URL: "redis://redis:6379"
  STORAGE_TYPE: "minio"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "skillshub-files"
  SCANNER_SERVICE_URL: "http://scanner:8000"

  # 扫描配置
  SCAN_SANDBOX_TIMEOUT: "120000"
  SCAN_MAX_CONCURRENT: "5"
  AUTO_APPROVE_MAX_SCORE: "30"

  # JWT 配置
  JWT_EXPIRY: "8h"
  JWT_REFRESH_EXPIRY: "7d"
